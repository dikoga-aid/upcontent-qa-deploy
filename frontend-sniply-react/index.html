<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict Content-Security-Policy (plan security item 5): the primary threat
      to in-memory access tokens is XSS, so we lock down script/connect sources.
      connect-src allows the API + the Auth0 tenant only. Vite's dev client uses
      a ws connection and inline styles, hence 'unsafe-inline' for style-src and
      ws: for connect-src in dev. Tighten further for a real production build.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               worker-src 'self' blob:;
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https:;
               connect-src 'self' http://127.0.0.1:3003 https://dev-rvvkxpvy18wueufd.us.auth0.com ws://localhost:3000;
               frame-src https://dev-rvvkxpvy18wueufd.us.auth0.com;
               base-uri 'self';
               form-action 'self';"
    />
    <title>Sniply — DEMO</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
