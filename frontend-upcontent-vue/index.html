<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict Content-Security-Policy (plan security item 5): protects the
      in-memory access token from XSS. connect-src allows the API + the Auth0
      tenant (the /oauth/token code-exchange and refresh-token rotation calls).
      Login is a full-page redirect and renewal uses rotating refresh tokens, so
      no silent-auth iframe is used (default-src 'self' already blocks framing).
      Vite dev needs ws: + 'unsafe-inline' styles; tighten for production.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               worker-src 'self' blob:;
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https:;
               connect-src 'self' http://127.0.0.1:3003 https://dev-rvvkxpvy18wueufd.us.auth0.com ws://localhost:3000;
               base-uri 'self';
               form-action 'self';"
    />
    <title>UpContent — DEMO</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
