<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict Content-Security-Policy (plan security item 5): protects the
      in-memory access token from XSS. connect-src allows the API + Auth0 only.
      Vite dev needs ws: + 'unsafe-inline' styles; tighten for production.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self';
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: https:;
               connect-src 'self' http://localhost:5000 https://dev-rvvkxpvy18wueufd.us.auth0.com ws://localhost:3001;
               frame-src https://dev-rvvkxpvy18wueufd.us.auth0.com;
               base-uri 'self';
               form-action 'self';"
    />
    <title>Sniply — DEMO</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
